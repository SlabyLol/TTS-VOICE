<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Horror TTS Engine - DarkFox Co.</title>
    <style>
        body { background: #050505; color: #ff0000; font-family: 'Courier New', monospace; display: flex; justify-content: center; padding-top: 50px; }
        .box { border: 2px solid #ff0000; padding: 30px; background: #000; box-shadow: 0 0 20px #ff0000; width: 450px; }
        textarea { width: 100%; background: #111; color: #ff0000; border: 1px solid #ff0000; padding: 10px; margin-bottom: 20px; }
        .control { margin-bottom: 15px; }
        input[type="range"] { width: 100%; accent-color: #ff0000; }
        button { width: 100%; padding: 15px; background: #ff0000; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:hover { background: #aa0000; }
        h2 { text-align: center; letter-spacing: 5px; text-shadow: 2px 2px #550000; }
    </style>
</head>
<body>

<div class="box">
    <h2>VOID CALLER</h2>
    <textarea id="msg" placeholder="Flüstere etwas in die Dunkelheit..."></textarea>

    <div class="control">
        <label>Dämonen-Tiefe (Pitch): <span id="pVal">100</span></label>
        <input type="range" id="pitch" min="1" max="100" value="100">
    </div>

    <div class="control">
        <label>Verzerrung (Distortion): <span id="dVal">50</span></label>
        <input type="range" id="dist" min="0" max="100" value="50">
    </div>

    <button onclick="invokeDemon()">STIMME BESCHWÖREN</button>
</div>

<script>
    // Audio Context für Sound-Manipulation
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function createDistortionCurve(amount) {
        let k = typeof amount === 'number' ? amount : 50,
            n_samples = 44100,
            curve = new Float32Array(n_samples),
            deg = Math.PI / 180,
            i = 0, x;
        for ( ; i < n_samples; ++i ) {
            x = i * 2 / n_samples - 1;
            curve[i] = ( 3 + k ) * x * 20 * deg / ( Math.PI + k * Math.abs(x) );
        }
        return curve;
    }

    function invokeDemon() {
        const text = document.getElementById('msg').value;
        const synth = window.speechSynthesis;
        const utter = new SpeechSynthesisUtterance(text);
        
        // Pitch-Berechnung für extrem tiefe Stimmen
        const p = document.getElementById('pitch').value;
        utter.pitch = p / 100; 
        utter.rate = 0.7; // Langsam ist gruseliger
        utter.lang = 'de-DE';

        // Web Audio Nodes verbinden für Effekte
        const source = audioCtx.createMediaStreamDestination();
        const distortion = audioCtx.createWaveShaper();
        
        distortion.curve = createDistortionCurve(document.getElementById('dist').value * 2);
        distortion.oversample = '4x';

        // ACHTUNG: Die Web Speech API ist schwer direkt zu "routen".
        // Dieser Code simuliert den Effekt durch Pitch & Rate Manipulation.
        // Für echtes MP3-Recording müsste man die Stimme via MediaRecorder aufnehmen.
        
        synth.speak(utter);
    }

    document.getElementById('pitch').oninput = function() { document.getElementById('pVal').innerText = this.value; }
    document.getElementById('dist').oninput = function() { document.getElementById('dVal').innerText = this.value; }
</script>

</body>
</html>
