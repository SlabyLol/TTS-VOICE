<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>VOID ENGINE V2 - DarkFox Co.</title>
    <style>
        body { background: #000; color: #660000; font-family: 'Courier New', monospace; text-align: center; }
        .container { margin-top: 100px; border: 1px dashed #330000; display: inline-block; padding: 40px; }
        textarea { background: #050505; color: #ff0000; border: 1px solid #330000; width: 300px; height: 80px; font-size: 1.2em; outline: none; }
        .glitch { font-size: 2em; color: #ff0000; text-transform: uppercase; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        button { background: #220000; color: #ff0000; border: 1px solid #ff0000; padding: 15px 30px; cursor: pointer; margin-top: 20px; font-weight: bold; }
        button:hover { background: #ff0000; color: #000; }
        .slider-label { display: block; margin-top: 15px; font-size: 0.8em; color: #444; }
    </style>
</head>
<body>

<div class="container">
    <div class="glitch">SYSTEM CRITICAL</div>
    <textarea id="input" placeholder="...sie hören dich..."></textarea>
    
    <span class="slider-label">VERZERRUNG DER REALITÄT</span>
    <input type="range" id="creep" min="1" max="100" value="100" style="width:100%; accent-color: #f00;">
    
    <button onclick="nightmare()">BESCHWÖREN</button>
</div>

<script>
    function nightmare() {
        const text = document.getElementById('input').value;
        const level = document.getElementById('creep').value / 100;
        
        // Stimme 1: Die tiefe Basis (Der Dämon)
        const v1 = new SpeechSynthesisUtterance(text);
        v1.pitch = 0.1; 
        v1.rate = 0.5;
        v1.volume = 1;
        v1.lang = 'de-DE';

        // Stimme 2: Das hohle Echo (Der Geist)
        const v2 = new SpeechSynthesisUtterance(text);
        v2.pitch = 0.5;
        v2.rate = 0.48; // Leicht langsamer für Echo-Effekt
        v2.volume = 0.7;
        v2.lang = 'de-DE';

        // Stimme 3: Der hohe "Schrei" (Optionaler Horror)
        const v3 = new SpeechSynthesisUtterance(text);
        v3.pitch = 1.8;
        v3.rate = 0.52;
        v3.volume = 0.3;
        v3.lang = 'de-DE';

        // Alle gleichzeitig abspielen
        window.speechSynthesis.speak(v1);
        window.speechSynthesis.speak(v2);
        window.speechSynthesis.speak(v3);
    }
</script>

</body>
</html>
